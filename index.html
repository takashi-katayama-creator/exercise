    width: 100%; padding: 10px 12px; font-size: 0.95rem;
    border: 1px solid #ccc; border-radius: 6px; outline: none;
    transition: border-color 0.15s;
  }
  .gate input[type="password"]:focus { border-color: #222; }
  .gate button {
    width: 100%; margin-top: 14px; padding: 11px;
    background: #222; color: #fff; border: 0; border-radius: 6px;
    font-size: 0.95rem; cursor: pointer; transition: background 0.15s;
  }
  .gate button:hover { background: #000; }
  .gate button:disabled { background: #999; cursor: wait; }
  .err { color: #c0392b; font-size: 0.85rem; margin-top: 10px; min-height: 1.2em; }
  .loading { text-align: center; color: #888; font-size: 0.9rem; }

<script>
(async function() {
  const PBKDF2_ITER = 200000;
  const SALT_LEN = 16;
  const IV_LEN = 12;
  const STORAGE_KEY = "spw_v1";

  const payload = document.getElementById("payload").textContent.trim();
  const enc = Uint8Array.from(atob(payload), c => c.charCodeAt(0));
  const salt = enc.slice(0, SALT_LEN);
  const iv = enc.slice(SALT_LEN, SALT_LEN + IV_LEN);
  const ct = enc.slice(SALT_LEN + IV_LEN);

  async function deriveKey(pw) {
    const keyMaterial = await crypto.subtle.importKey(
      "raw", new TextEncoder().encode(pw),
      "PBKDF2", false, ["deriveKey"]
    );
    return crypto.subtle.deriveKey(
      { name: "PBKDF2", salt: salt, iterations: PBKDF2_ITER, hash: "SHA-256" },
      keyMaterial,
      { name: "AES-GCM", length: 256 },
      false, ["decrypt"]
    );
  }

  async function tryDecrypt(pw) {
    try {
      const key = await deriveKey(pw);
      const pt = await crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, key, ct);
      return new TextDecoder().decode(pt);
    } catch (e) {
      return null;
    }
  }

  function showContent(html) {
    try { sessionStorage.setItem(STORAGE_KEY, document.getElementById("pw").value || sessionStorage.getItem(STORAGE_KEY) || ""); } catch(e) {}
    // 復号後のHTMLに no-screenshot.js の読み込みを強制的に注入する
    // (document.write は元のスクリプトを破棄するため、復号後HTML側に再注入が必要)
    if (!/no-screenshot\.js/i.test(html)) {
      if (/<head[^>]*>/i.test(html)) {
        html = html.replace(/<head[^>]*>/i, function(m){ return m + '\n<script src="no-screenshot.js"><\/script>'; });
      } else if (/<html[^>]*>/i.test(html)) {
        html = html.replace(/<html[^>]*>/i, function(m){ return m + '\n<head><script src="no-screenshot.js"><\/script></head>'; });
      } else {
        html = '<script src="no-screenshot.js"><\/script>\n' + html;
      }
    }
    document.open();
    document.write(html);
    document.close();
  }

  // Auto-unlock if password is in sessionStorage
  try {
    const saved = sessionStorage.getItem(STORAGE_KEY);
    if (saved) {
      const pt = await tryDecrypt(saved);
      if (pt) { showContent(pt); return; }
    }
  } catch(e) {}

  document.getElementById("form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const btn = document.getElementById("btn");
    const err = document.getElementById("err");
    const pw = document.getElementById("pw").value;
    err.textContent = "";
    btn.disabled = true;
    btn.textContent = "復号中…";
    const pt = await tryDecrypt(pw);
    if (pt) {
      try { sessionStorage.setItem(STORAGE_KEY, pw); } catch(e) {}
      showContent(pt);
    } else {
      err.textContent = "パスワードが違います";
      btn.disabled = false;
      btn.textContent = "解錠";
      document.getElementById("pw").select();
    }
  });
})();
</script>
